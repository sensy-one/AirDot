onboarding:
  setup_language:
    title: Nyelv kiválasztása
    body: |-
      Nyomd meg röviden a váltáshoz.
      Tartsd lenyomva a megerősítéshez.
  setup_connect:
    title: AirDot beállítása
    body: |-
      Nyisd meg a Wi-Fi-t a telefonodon,
      és válaszd az AirDot-XXXXXX hálózatot.

      Ezután nyisd meg a böngészőt,
      és lépj a 192.168.4.1 címre.
    button_0: Később
    button_0_reopen: Vissza

  setup_applying:
    title: Csatlakozás
    body: |-
      Az AirDot alkalmazza a beállításokat
      és kapcsolódik a hálózathoz.
    button_0: Kérlek várj…

  setup_complete:
    title: AirDot beállítva
    body: |-
      Mostantól nyomon követheted
      a levegőminőséget.
    countdown: Áttekintés megnyitása {seconds} másodperc múlva…
