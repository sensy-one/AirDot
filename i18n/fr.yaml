onboarding:
  setup_language:
    title: Choisissez la langue
    body: |-
      Appuyez brièvement pour changer.
      Maintenez enfoncé pour confirmer.
  setup_connect:
    title: Configurer AirDot
    body: |-
      Ouvrez le Wi-Fi sur votre téléphone
      et choisissez AirDot-XXXXXX.

      Ouvrez ensuite votre navigateur
      et allez sur 192.168.4.1
    button_0: Plus tard
    button_0_reopen: Retour

  setup_applying:
    title: Connexion en cours
    body: |-
      AirDot applique vos paramètres
      et établit la connexion.
    button_0: Un instant…

  setup_complete:
    title: AirDot est configuré
    body: |-
      Vous pouvez maintenant suivre
      la qualité de l’air.
    countdown: L’aperçu s’ouvre dans {seconds}…
