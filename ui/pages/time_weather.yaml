                  text_align: CENTER
              - label:
                  id: time_page_12h_hour_ones_label
                  width: 30
                  text: "0"
                  text_font: ui_font_status
                  text_color: 0xFFFFFF
                  bg_opa: TRANSP
                  long_mode: CLIP
