id: time_page
bg_color: 0x000000
bg_opa: COVER
pad_all: 0

widgets:
  - obj:
      align: TOP_MID
      y: 58
      width: SIZE_CONTENT
      height: SIZE_CONTENT
      bg_opa: TRANSP
      border_width: 0
      pad_all: 0
      layout:
        type: FLEX
        flex_flow: COLUMN
        flex_align_main: CENTER
        flex_align_cross: CENTER
      widgets:
        - obj:
            width: SIZE_CONTENT
            height: SIZE_CONTENT
            bg_opa: TRANSP
            border_width: 0
            pad_all: 0
            layout:
              type: FLEX
              flex_flow: ROW
              flex_align_main: CENTER
              flex_align_cross: CENTER
            widgets:
              - label:
                  id: time_page_connection_indicator_label
                  text: "●"
                  text_font: ui_font_small
                  text_color: 0xFF2B2B
                  bg_opa: TRANSP
                  translate_y: -2
              - label:
                  id: time_page_connection_label
                  text: "--"
                  text_font: ui_font_small
                  text_color: 0xFFFFFF
                  bg_opa: TRANSP
        - obj:
            width: SIZE_CONTENT
            height: SIZE_CONTENT
            bg_opa: TRANSP
            border_width: 0
            pad_all: 0
            pad_top: 6
            layout:
              type: FLEX
              flex_flow: ROW
              flex_align_main: CENTER
              flex_align_cross: END
            widgets:
              - label:
                  id: time_page_outdoor_temperature_label
                  text: "--"
                  text_font: ui_font_small
                  text_color: 0xFFFFFF
                  bg_opa: TRANSP
                  text_letter_space: 1
              - label:
                  id: time_page_outdoor_temperature_unit_label
                  text: "°C"
                  text_font: ui_font_summary_unit
                  text_color: 0xFFFFFF
                  bg_opa: TRANSP
                  translate_x: -7
                  pad_right: 11
              - label:
                  id: time_page_outdoor_humidity_label
                  text: "--"
                  text_font: ui_font_small
                  text_color: 0xFFFFFF
                  bg_opa: TRANSP
                  text_letter_space: 1
              - label:
                  id: time_page_outdoor_humidity_unit_label
                  text: "%"
                  text_font: ui_font_summary_unit
                  text_color: 0xFFFFFF
                  bg_opa: TRANSP
                  translate_x: -7
                  pad_right: 11
              - label:
                  id: time_page_outdoor_pressure_label
                  text: "--"
                  text_font: ui_font_small
                  text_color: 0xFFFFFF
                  bg_opa: TRANSP
                  text_letter_space: 1
              - label:
                  id: time_page_outdoor_pressure_unit_label
                  text: "hPa"
                  text_font: ui_font_summary_unit
                  text_color: 0xFFFFFF
                  bg_opa: TRANSP
                  translate_x: -7
                  pad_left: 1
  - label:
      id: time_page_placeholder_label
      align: CENTER
      x: 0
      y: -16
      text: "-- : --"
      text_font: ui_font_status
      text_color: 0xFFFFFF
      bg_opa: TRANSP
  - obj:
      id: time_page_24h_group
      align: CENTER
      x: 0
      y: -16
      hidden: true
      width: SIZE_CONTENT
      height: SIZE_CONTENT
      bg_opa: TRANSP
      border_width: 0
      pad_all: 0
      layout:
        type: FLEX
        flex_flow: ROW
        flex_align_main: CENTER
        flex_align_cross: CENTER
        pad_column: 0
