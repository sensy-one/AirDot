id: air_quality_summary_page
bg_color: 0x000000
bg_opa: COVER
pad_all: 0

widgets:
  - obj:
      align: TOP_MID
      y: 58
      width: SIZE_CONTENT
      height: SIZE_CONTENT
      bg_opa: TRANSP
      border_width: 0
      pad_all: 0
      layout:
        type: FLEX
        flex_flow: COLUMN
        flex_align_main: CENTER
        flex_align_cross: CENTER
      widgets:
        - obj:
            width: SIZE_CONTENT
            height: SIZE_CONTENT
            bg_opa: TRANSP
            border_width: 0
            pad_all: 0
            layout:
              type: FLEX
              flex_flow: ROW
              flex_align_main: CENTER
              flex_align_cross: CENTER
            widgets:
              - label:
                  id: air_quality_summary_connection_indicator_label
                  text: "●"
                  text_font: ui_font_small
                  text_color: 0xFF2B2B
                  bg_opa: TRANSP
                  translate_y: -2
              - label:
                  id: air_quality_summary_connection_label
                  text: "--"
                  text_font: ui_font_small
                  text_color: 0xFFFFFF
                  bg_opa: TRANSP
        - obj:
            width: SIZE_CONTENT
            height: SIZE_CONTENT
            bg_opa: TRANSP
            border_width: 0
            pad_all: 0
            pad_top: 6
            layout:
              type: FLEX
              flex_flow: ROW
              flex_align_main: CENTER
              flex_align_cross: END
            widgets:
              - label:
                  id: air_quality_summary_temperature_label
                  text: "--"
                  text_font: ui_font_small
                  text_color: 0xFFFFFF
                  bg_opa: TRANSP
                  text_letter_space: 1
              - label:
                  id: air_quality_summary_temperature_unit_label
                  text: "°C"
                  text_font: ui_font_summary_unit
                  text_color: 0xFFFFFF
                  bg_opa: TRANSP
                  translate_x: -7
                  pad_right: 11
              - label:
                  id: air_quality_summary_humidity_label
                  text: "--"
                  text_font: ui_font_small
                  text_color: 0xFFFFFF
                  bg_opa: TRANSP
                  text_letter_space: 1
              - label:
                  id: air_quality_summary_humidity_unit_label
                  text: "%"
                  text_font: ui_font_summary_unit
                  text_color: 0xFFFFFF
                  bg_opa: TRANSP
                  translate_x: -7
                  pad_right: 11
              - label:
                  id: air_quality_summary_pressure_label
                  text: "--"
                  text_font: ui_font_small
                  text_color: 0xFFFFFF
                  bg_opa: TRANSP
                  text_letter_space: 1
              - label:
                  id: air_quality_summary_pressure_unit_label
                  text: "hPa"
                  text_font: ui_font_summary_unit
                  text_color: 0xFFFFFF
                  bg_opa: TRANSP
                  translate_x: -7
                  pad_left: 1

  - label:
      id: air_quality_summary_status_label
      align: CENTER
      x: 0
      y: -16
      text: "--"
      text_font: ui_font_status
      text_color: 0xFFFFFF
      bg_opa: TRANSP
      text_letter_space: 1

  - label:
      id: air_quality_summary_action_label
      align: CENTER
      x: 0
      y: 28
      text: "--"
      text_font: ui_font_action
      text_color: 0xFFFFFF
      bg_opa: TRANSP
      text_letter_space: 1

  - obj:
      align: BOTTOM_MID
      y: -58
      width: SIZE_CONTENT
      height: SIZE_CONTENT
      bg_opa: TRANSP
      border_width: 0
      pad_all: 0
      layout:
        type: FLEX
        flex_flow: COLUMN
        flex_align_main: CENTER
        flex_align_cross: CENTER
      widgets:
        - obj:
            width: SIZE_CONTENT
            height: SIZE_CONTENT
            bg_opa: TRANSP
            border_width: 0
            pad_all: 0
            layout:
              type: FLEX
              flex_flow: ROW
              flex_align_main: CENTER
              flex_align_cross: CENTER
            widgets:
              - label:
                  id: air_quality_summary_pm25_indicator_label
                  text: "●"
                  text_font: ui_font_small
                  text_color: 0xFFFFFF
                  bg_opa: TRANSP
                  translate_y: -2
              - label:
                  id: air_quality_summary_pm25_text_label
                  text: "PM₂"
                  text_font: ui_font_small
                  text_color: 0xFFFFFF
                  bg_opa: TRANSP
                  pad_right: 18
              - label:
                  id: air_quality_summary_co2_indicator_label
                  text: "●"
                  text_font: ui_font_small
                  text_color: 0xFFFFFF
                  bg_opa: TRANSP
                  translate_y: -2
              - label:
                  id: air_quality_summary_co2_text_label
                  text: "CO₂"
                  text_font: ui_font_small
                  text_color: 0xFFFFFF
                  bg_opa: TRANSP
                  pad_right: 18
              - label:
                  id: air_quality_summary_voc_indicator_label
                  text: "●"
                  text_font: ui_font_small
                  text_color: 0xFFFFFF
                  bg_opa: TRANSP
                  translate_y: -2
              - label:
                  id: air_quality_summary_voc_text_label
                  text: "VOC"
                  text_font: ui_font_small
                  text_color: 0xFFFFFF
                  bg_opa: TRANSP
        - obj:
            width: SIZE_CONTENT
            height: SIZE_CONTENT
            bg_opa: TRANSP
            border_width: 0
            pad_all: 0
            pad_top: 6
            layout:
              type: FLEX
              flex_flow: ROW
              flex_align_main: CENTER
              flex_align_cross: CENTER
            widgets:
              - label:
                  id: air_quality_summary_pm10_indicator_label
                  text: "●"
                  text_font: ui_font_small
                  text_color: 0xFFFFFF
                  bg_opa: TRANSP
                  translate_y: -2
              - label:
                  id: air_quality_summary_pm10_text_label
                  text: "PM₁₀"
                  text_font: ui_font_small
                  text_color: 0xFFFFFF
                  bg_opa: TRANSP
                  pad_right: 18
              - label:
                  id: air_quality_summary_nox_indicator_label
                  text: "●"
                  text_font: ui_font_small
                  text_color: 0xFFFFFF
                  bg_opa: TRANSP
                  translate_y: -2
              - label:
                  id: air_quality_summary_nox_text_label
                  text: "NOx"
                  text_font: ui_font_small
                  text_color: 0xFFFFFF
                  bg_opa: TRANSP
