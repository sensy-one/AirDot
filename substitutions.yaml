device_name: airdot
device_friendly_name: AirDot
device_manufacturer: sensy-one
device_model: AirDot
device_project_name: sensy-one.AirDot
device_firmware_version: "v1.2.2"

display_backlight_pin: GPIO44
alert_buzzer_pin: GPIO7
button_page_pin: GPIO6

display_panel_pclk_frequency: 13MHz

mqtt_default_topic_prefix: airdot
ha_sensor_update_interval: 10s

sensor_lux_update_interval: 1s
sensor_environment_update_interval: 1s
sensor_air_quality_update_interval: 1s

display_auto_dim_min_brightness: "0.0002"
display_auto_dim_min_lux: "1"
display_auto_dim_max_lux: "300"
sensor_lux_window_correction: "4"

sensor_warmup_seconds: "120"
setup_wifi_connect_timeout_seconds: "60"

sen66_temperature_offset_c: "-4.3"
sen66_temperature_offset_slope: "0"
sen66_temperature_offset_time_constant_s: "0"
sen66_temperature_offset_slot: "0"

ui_pm1_graph_min_ugm3: "0"
ui_pm1_graph_max_ugm3: "35"

ui_pm25_graph_min_ugm3: "0"
ui_pm25_graph_max_ugm3: "35"

ui_pm4_graph_min_ugm3: "0"
ui_pm4_graph_max_ugm3: "50"

ui_pm10_graph_min_ugm3: "0"
ui_pm10_graph_max_ugm3: "100"

ui_voc_graph_min_index: "0"
ui_voc_graph_max_index: "500"

ui_nox_graph_min_index: "1"
ui_nox_graph_max_index: "500"

ui_co2_graph_min_ppm: "400"
ui_co2_graph_max_ppm: "2000"
