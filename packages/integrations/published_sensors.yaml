sensor:
  - platform: template
    id: ha_ambient_light
    name: Light
    internal: false
    update_interval: ${ha_sensor_update_interval}
    unit_of_measurement: lx
    accuracy_decimals: 0
    device_class: illuminance
    state_class: measurement
    lambda: |-
      if (!id(ambient_light_sensor).has_state() ||
          !std::isfinite(id(ambient_light_sensor).state) ||
          id(ambient_light_sensor).state < 0.0f) {
        return {};
      }
      return id(ambient_light_sensor).state;

  - platform: template
    id: ha_pressure
    name: Pressure
    internal: false
    update_interval: ${ha_sensor_update_interval}
    unit_of_measurement: hPa
    accuracy_decimals: 0
    device_class: atmospheric_pressure
    state_class: measurement
    lambda: |-
      if (!id(pressure).has_state() ||
          !std::isfinite(id(pressure).state) ||
          id(pressure).state < 30000.0f ||
          id(pressure).state > 120000.0f) {
        return {};
      }
      return static_cast<float>(static_cast<int>(id(pressure).state / 100.0f));

  - platform: template
    id: ha_pm1
    name: PM1
    internal: false
    update_interval: ${ha_sensor_update_interval}
    unit_of_measurement: "µg/m³"
    accuracy_decimals: 2
    device_class: pm1
    state_class: measurement
    lambda: |-
      const uint32_t now = millis();
      if ((id(air_quality_warmup_until_ms) != 0 &&
           static_cast<int32_t>(now - id(air_quality_warmup_until_ms)) < 0) ||
          !id(pm1).has_state() ||
          !AirDot::air_quality_metric_value_valid(AirDot::AirQualityMetric::PM1, id(pm1).state)) {
        return {};
      }
      return id(pm1).state;

