    accuracy_decimals: 0
    icon: mdi:molecule
    state_class: measurement
    lambda: |-
      const uint32_t now = millis();
      if ((id(air_quality_warmup_until_ms) != 0 &&
           static_cast<int32_t>(now - id(air_quality_warmup_until_ms)) < 0) ||
          !id(nox).has_state()) {
        return {};
      }
      const float nox_index = AirDot::normalize_nox_index(id(nox).state);
      if (!AirDot::air_quality_metric_value_valid(AirDot::AirQualityMetric::NOX, nox_index)) {
        return {};
      }
      return nox_index;

