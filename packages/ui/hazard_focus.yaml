globals:
  - id: air_quality_hazard_focus_metric
    type: int
    restore_value: false
    initial_value: "-1"
  - id: air_quality_hazard_focus_last_switch_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"
  - id: air_quality_hazard_focus_hazard_since_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"
  - id: air_quality_hazard_focus_clear_since_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"
  - id: air_quality_hazard_focus_status_since_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"
  - id: air_quality_hazard_focus_return_page
    type: int
    restore_value: false
    initial_value: "-1"
  - id: air_quality_hazard_focus_snooze_until_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"
script:
  - id: ui_update_hazard_focus
    mode: restart
    then:
      - lambda: |-
          const auto air_quality_profile = AirDot::onboarding::load_air_quality_profile();
          const bool setup_or_onboarding_active =
            AirDot::onboarding::setup_or_onboarding_active(
              id(setup_ap_active), id(setup_portal_active), id(onboarding_ui_active));
          constexpr int FOCUS_NONE = -1;
          constexpr int FOCUS_PM25 = 0;
          constexpr int FOCUS_PM10 = 1;
          constexpr int FOCUS_CO2 = 2;
          constexpr int FOCUS_VOC = 3;
          constexpr int FOCUS_NOX = 4;
          constexpr int FOCUS_RETURN_UNKNOWN = -1;
          constexpr uint32_t HAZARD_FOCUS_ENTER_DELAY_MS = 4000UL;
          constexpr uint32_t HAZARD_FOCUS_CLEAR_DELAY_MS = 4000UL;
          constexpr uint32_t HAZARD_FOCUS_STATUS_HOLD_MS = 4000UL;
          constexpr uint32_t HAZARD_FOCUS_ROTATE_MS = 3000UL;
          const uint32_t focus_now = millis();

          const bool warmup_active =
            id(air_quality_warmup_until_ms) != 0 &&
            static_cast<int32_t>(focus_now - id(air_quality_warmup_until_ms)) < 0;

          int alert_count = 0;
          int active_metrics[5];
          int active_count = 0;
          auto add_metric_level = [&](int metric, AirDot::AirQualityMetric air_quality_metric, float value) {
            value = AirDot::sanitized_air_quality_metric_value(air_quality_metric, value);
            const int metric_level = AirDot::threshold_level(
              value, AirDot::metric_status_thresholds(air_quality_profile, air_quality_metric));
            if (metric_level >= 4)
              alert_count++;
            if (metric_level >= 3)
              active_metrics[active_count++] = metric;
          };
          add_metric_level(FOCUS_PM25, AirDot::AirQualityMetric::PM25, id(pm25).state);
          add_metric_level(FOCUS_PM10, AirDot::AirQualityMetric::PM10, id(pm10).state);
          add_metric_level(FOCUS_CO2, AirDot::AirQualityMetric::CO2, id(co2).state);
          add_metric_level(FOCUS_VOC, AirDot::AirQualityMetric::VOC, id(voc).state);
          add_metric_level(FOCUS_NOX, AirDot::AirQualityMetric::NOX, id(nox).state);

          const bool focus_mode_available =
            AirDot::onboarding::load_hazard_focus_mode_enabled() &&
            !setup_or_onboarding_active &&
            !warmup_active;
          auto show_summary_page = [&]() {
            id(air_quality_summary_page)->get_parent()->show_page(
              id(air_quality_summary_page)->index, LV_SCREEN_LOAD_ANIM_NONE, 0);
          };
          auto wake_display = [&]() {
            id(display_panel).set_screen_powered(true);
            AirDot::onboarding::apply_display_brightness(
              id(display_backlight), id(ambient_light_sensor).state,
              ${display_auto_dim_min_lux}, ${display_auto_dim_max_lux},
              ${display_auto_dim_min_brightness});
          };
          auto night_screen_off_active = [&]() {
            const auto screen_now = id(sntp_time).utcnow();
            return screen_now.is_valid() &&
                   AirDot::onboarding::screen_off_window_active_at_utc(
                     static_cast<uint32_t>(screen_now.timestamp));
          };
          auto current_page_index = [&]() -> int {
            if (id(air_quality_summary_page)->is_showing())
              return id(air_quality_summary_page)->index;
            if (id(time_page)->is_showing())
              return id(time_page)->index;
            if (id(flight_radar_page)->is_showing())
              return id(flight_radar_page)->index;
            if (id(pm1_history_page)->is_showing())
              return id(pm1_history_page)->index;
            if (id(pm25_history_page)->is_showing())
              return id(pm25_history_page)->index;
            if (id(pm4_history_page)->is_showing())
              return id(pm4_history_page)->index;
            if (id(pm10_history_page)->is_showing())
              return id(pm10_history_page)->index;
            if (id(co2_history_page)->is_showing())
              return id(co2_history_page)->index;
            if (id(voc_history_page)->is_showing())
              return id(voc_history_page)->index;
            if (id(nox_history_page)->is_showing())
              return id(nox_history_page)->index;
            if (id(temp_history_page)->is_showing())
              return id(temp_history_page)->index;
            if (id(hum_history_page)->is_showing())
              return id(hum_history_page)->index;
            if (id(pressure_history_page)->is_showing())
              return id(pressure_history_page)->index;
            if (id(lux_history_page)->is_showing())
              return id(lux_history_page)->index;
            return FOCUS_RETURN_UNKNOWN;
          };
          auto show_return_page = [&]() {
            if (id(air_quality_hazard_focus_return_page) == FOCUS_RETURN_UNKNOWN) {
              show_summary_page();
              return;
            }
            id(air_quality_summary_page)->get_parent()->show_page(
              id(air_quality_hazard_focus_return_page), LV_SCREEN_LOAD_ANIM_NONE, 0);
          };
          auto reset_focus_state = [&]() {
            id(air_quality_hazard_focus_metric) = FOCUS_NONE;
            id(air_quality_hazard_focus_last_switch_ms) = 0;
            id(air_quality_hazard_focus_hazard_since_ms) = 0;
            id(air_quality_hazard_focus_clear_since_ms) = 0;
            id(air_quality_hazard_focus_status_since_ms) = 0;
            id(air_quality_hazard_focus_return_page) = FOCUS_RETURN_UNKNOWN;
          };
          if (id(air_quality_hazard_focus_snooze_until_ms) != 0) {
            if (static_cast<int32_t>(focus_now - id(air_quality_hazard_focus_snooze_until_ms)) < 0) {
              reset_focus_state();
              return;
            }
            id(air_quality_hazard_focus_snooze_until_ms) = 0;
          }
          if (!focus_mode_available) {
            if (id(air_quality_hazard_focus_metric) != FOCUS_NONE ||
                id(air_quality_hazard_focus_hazard_since_ms) != 0) {
              show_return_page();
            }
            reset_focus_state();
            return;
          }

          const bool focus_was_pending_or_active =
            id(air_quality_hazard_focus_hazard_since_ms) != 0 ||
            id(air_quality_hazard_focus_metric) != FOCUS_NONE ||
            id(air_quality_hazard_focus_clear_since_ms) != 0 ||
            id(air_quality_hazard_focus_status_since_ms) != 0;
          const bool focus_should_show_history =
            alert_count > 0 || (focus_was_pending_or_active && active_count > 0);
          if (!focus_should_show_history) {
            if (!focus_was_pending_or_active) {
              id(air_quality_hazard_focus_clear_since_ms) = 0;
              id(air_quality_hazard_focus_status_since_ms) = 0;
              id(air_quality_hazard_focus_last_switch_ms) = 0;
              return;
            }
            if (id(air_quality_hazard_focus_clear_since_ms) == 0) {
              id(air_quality_hazard_focus_clear_since_ms) = focus_now;
            }
            if (static_cast<uint32_t>(focus_now - id(air_quality_hazard_focus_clear_since_ms)) <
                HAZARD_FOCUS_CLEAR_DELAY_MS) {
              return;
            }

            if (id(air_quality_hazard_focus_status_since_ms) == 0) {
              show_summary_page();
              wake_display();
              id(air_quality_hazard_focus_status_since_ms) = focus_now;
              return;
            }
            if (static_cast<uint32_t>(focus_now - id(air_quality_hazard_focus_status_since_ms)) <
                HAZARD_FOCUS_STATUS_HOLD_MS) {
              return;
            }

            const bool display_sleep_button_wake_active =
              id(page_button_pressed_at_ms) != 0 ||
              (id(display_sleep_wake_until_ms) != 0 &&
               static_cast<int32_t>(focus_now - id(display_sleep_wake_until_ms)) < 0);
            const bool sleep_after_focus =
              night_screen_off_active() && id(ui_alert_active) == 0 && !display_sleep_button_wake_active;
            if (!sleep_after_focus)
              show_return_page();
            reset_focus_state();
            if (sleep_after_focus) {
              id(display_backlight).turn_off().perform();
              id(display_panel).set_screen_powered(false);
            }
            return;
          }

          id(air_quality_hazard_focus_clear_since_ms) = 0;
          id(air_quality_hazard_focus_status_since_ms) = 0;
          if (id(air_quality_hazard_focus_hazard_since_ms) == 0) {
            id(air_quality_hazard_focus_return_page) = current_page_index();
            id(air_quality_hazard_focus_hazard_since_ms) = focus_now;
            show_summary_page();
            wake_display();
          }
          if (id(air_quality_hazard_focus_metric) == FOCUS_NONE &&
              static_cast<uint32_t>(focus_now - id(air_quality_hazard_focus_hazard_since_ms)) <
                HAZARD_FOCUS_ENTER_DELAY_MS) {
            return;
          }

          int current_slot = -1;
          for (int i = 0; i < active_count; i++) {
            if (active_metrics[i] == id(air_quality_hazard_focus_metric)) {
              current_slot = i;
              break;
            }
          }

          int target_slot = current_slot >= 0 ? current_slot : 0;
          if (current_slot < 0) {
            id(air_quality_hazard_focus_last_switch_ms) = focus_now;
          } else if (
              active_count > 1 &&
              static_cast<uint32_t>(focus_now - id(air_quality_hazard_focus_last_switch_ms)) >=
                HAZARD_FOCUS_ROTATE_MS) {
            target_slot = (current_slot + 1) % active_count;
            id(air_quality_hazard_focus_last_switch_ms) = focus_now;
          }

          const int target_metric = active_metrics[target_slot];
          bool target_page_showing = false;
          switch (target_metric) {
            case FOCUS_PM25:
              target_page_showing = id(pm25_history_page)->is_showing();
              break;
            case FOCUS_PM10:
              target_page_showing = id(pm10_history_page)->is_showing();
              break;
            case FOCUS_CO2:
              target_page_showing = id(co2_history_page)->is_showing();
              break;
            case FOCUS_VOC:
              target_page_showing = id(voc_history_page)->is_showing();
              break;
            case FOCUS_NOX:
              target_page_showing = id(nox_history_page)->is_showing();
              break;
          }

          if (target_metric == id(air_quality_hazard_focus_metric) && target_page_showing) {
            return;
          }

          id(air_quality_hazard_focus_metric) = target_metric;
          switch (target_metric) {
            case FOCUS_PM25:
              id(pm25_history_page)->get_parent()->show_page(id(pm25_history_page)->index, LV_SCREEN_LOAD_ANIM_NONE, 0);
              break;
            case FOCUS_PM10:
              id(pm10_history_page)->get_parent()->show_page(id(pm10_history_page)->index, LV_SCREEN_LOAD_ANIM_NONE, 0);
              break;
            case FOCUS_CO2:
              id(co2_history_page)->get_parent()->show_page(id(co2_history_page)->index, LV_SCREEN_LOAD_ANIM_NONE, 0);
              break;
            case FOCUS_VOC:
              id(voc_history_page)->get_parent()->show_page(id(voc_history_page)->index, LV_SCREEN_LOAD_ANIM_NONE, 0);
              break;
            case FOCUS_NOX:
              id(nox_history_page)->get_parent()->show_page(id(nox_history_page)->index, LV_SCREEN_LOAD_ANIM_NONE, 0);
              break;
          }
