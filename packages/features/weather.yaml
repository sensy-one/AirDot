globals:
  - id: outdoor_latitude
    type: float
    restore_value: false
    initial_value: "0"
  - id: outdoor_longitude
    type: float
    restore_value: false
    initial_value: "0"
  - id: outdoor_location_valid
    type: bool
    restore_value: false
    initial_value: "false"
  - id: outdoor_location_exact
    type: bool
    restore_value: false
    initial_value: "false"
  - id: outdoor_weather_temperature_c
    type: float
    restore_value: false
    initial_value: "0"
  - id: outdoor_weather_humidity_percent
    type: float
    restore_value: false
    initial_value: "0"
  - id: outdoor_weather_pressure_hpa
    type: float
    restore_value: false
    initial_value: "0"
  - id: outdoor_weather_high_temperature_c
    type: float
    restore_value: false
    initial_value: "0"
  - id: outdoor_weather_low_temperature_c
    type: float
    restore_value: false
    initial_value: "0"
  - id: outdoor_weather_code
    type: int
    restore_value: false
    initial_value: "-1"
  - id: outdoor_weather_valid
    type: bool
    restore_value: false
    initial_value: "false"
  - id: outdoor_weather_next_request_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"

script:
  - id: weather_refresh_location
    mode: restart
    then:
      - if:
          condition:
            lambda: "return AirDot::onboarding::weather_runtime_allowed(id(setup_ap_active), id(setup_portal_active), id(onboarding_ui_active));"
          then:
            - lambda: |-
                if (AirDot::onboarding::exact_location_enabled()) {
                  id(ui_refresh_time_weather_page).execute();
                }
            - delay: 12s
            - if:
                condition:
                  lambda: "return AirDot::onboarding::weather_runtime_allowed(id(setup_ap_active), id(setup_portal_active), id(onboarding_ui_active));"
                then:
                  - lambda: |-
                      bool started = false;
                      float latitude = 0.0f;
                      float longitude = 0.0f;
                      if (AirDot::onboarding::load_exact_location(latitude, longitude)) {
                        id(outdoor_latitude) = latitude;
                        id(outdoor_longitude) = longitude;
                        id(outdoor_location_valid) = true;
                        id(outdoor_location_exact) = true;
                        id(outdoor_weather_next_request_ms) = 0;
                        started = true;
                      } else {
                        started = AirDot::time_weather::start_ipwhois_location_request();
                      }
                      if (started) {
                        id(ui_refresh_time_weather_page).execute();
                      }

interval:
  - interval: 1s
    then:
      - lambda: |-
          float latitude = 0.0f;
          float longitude = 0.0f;
          const uint32_t now_ms = millis();
          const bool weather_enabled = AirDot::onboarding::load_weather_enabled();
          const bool runtime_weather_allowed =
              AirDot::onboarding::weather_runtime_allowed(
                  id(setup_ap_active), id(setup_portal_active), id(onboarding_ui_active));
          float exact_latitude = 0.0f;
          float exact_longitude = 0.0f;
          const bool exact_location =
              AirDot::onboarding::load_exact_location(exact_latitude, exact_longitude);
          if (!weather_enabled) {
            id(outdoor_location_valid) = false;
            id(outdoor_location_exact) = false;
            id(outdoor_weather_valid) = false;
            id(outdoor_weather_code) = -1;
            id(outdoor_weather_next_request_ms) = 0;
          } else if (exact_location) {
            const bool location_changed =
                !id(outdoor_location_valid) ||
                std::fabs(id(outdoor_latitude) - exact_latitude) > 0.00001f ||
                std::fabs(id(outdoor_longitude) - exact_longitude) > 0.00001f;
            id(outdoor_latitude) = exact_latitude;
            id(outdoor_longitude) = exact_longitude;
            id(outdoor_location_valid) = true;
            id(outdoor_location_exact) = true;
            if (location_changed)
              id(outdoor_weather_next_request_ms) = 0;
          } else if (id(outdoor_location_exact)) {
            id(outdoor_location_valid) = false;
            id(outdoor_location_exact) = false;
            id(outdoor_weather_next_request_ms) = 0;
            if (runtime_weather_allowed)
              id(weather_refresh_location).execute();
          }

          const int location_result = AirDot::time_weather::consume_ipwhois_location_result(latitude, longitude);
          if (weather_enabled && location_result == 1 && !exact_location) {
            id(outdoor_latitude) = latitude;
            id(outdoor_longitude) = longitude;
            id(outdoor_location_valid) = true;
            id(outdoor_location_exact) = false;
            if (runtime_weather_allowed) {
              if (AirDot::time_weather::start_open_meteo_weather_request(latitude, longitude))
                id(outdoor_weather_next_request_ms) = now_ms + 30000UL;
            }
          } else if (weather_enabled && location_result == -1 && !exact_location) {
            if (!id(outdoor_location_valid)) {
              id(outdoor_weather_valid) = false;
              id(outdoor_weather_code) = -1;
            }
            if (runtime_weather_allowed)
              id(weather_refresh_location).execute();
          }

          float temperature_c = 0.0f;
          float humidity_percent = 0.0f;
          float pressure_hpa = 0.0f;
          float high_temperature_c = 0.0f;
          float low_temperature_c = 0.0f;
          int weather_code = -1;
          const int weather_result =
              AirDot::time_weather::consume_open_meteo_weather_result(
                  temperature_c, humidity_percent, pressure_hpa,
                  high_temperature_c, low_temperature_c, weather_code);
          const bool weather_matches_current_location =
              id(outdoor_location_valid) &&
              AirDot::time_weather::open_meteo_weather_request_matches(
                  id(outdoor_latitude), id(outdoor_longitude));
          if (weather_enabled && weather_result == 1 && weather_matches_current_location) {
            id(outdoor_weather_temperature_c) = temperature_c;
            id(outdoor_weather_humidity_percent) = humidity_percent;
            id(outdoor_weather_pressure_hpa) = pressure_hpa;
            id(outdoor_weather_high_temperature_c) = high_temperature_c;
            id(outdoor_weather_low_temperature_c) = low_temperature_c;
            id(outdoor_weather_code) = weather_code;
            id(outdoor_weather_valid) = true;
            id(outdoor_weather_next_request_ms) = now_ms + 15UL * 60UL * 1000UL;
          } else if (weather_enabled && weather_result == 1 && !weather_matches_current_location &&
                     id(outdoor_location_valid)) {
            id(outdoor_weather_next_request_ms) = 0;
          } else if (weather_result != 0) {
            const auto status = AirDot::connectivity::get_service_status(
                AirDot::connectivity::Service::WEATHER);
            id(outdoor_weather_next_request_ms) =
                status.next_retry_ms != 0 ? status.next_retry_ms : now_ms + 30000UL;
          }

          if (weather_enabled && runtime_weather_allowed && id(outdoor_location_valid)) {
            const bool weather_due = id(outdoor_weather_next_request_ms) == 0 ||
                static_cast<int32_t>(now_ms - id(outdoor_weather_next_request_ms)) >= 0;
            if (weather_due) {
              if (AirDot::time_weather::start_open_meteo_weather_request(
                      id(outdoor_latitude), id(outdoor_longitude))) {
                id(outdoor_weather_next_request_ms) = now_ms + 30000UL;
              } else {
                const auto status = AirDot::connectivity::get_service_status(
                    AirDot::connectivity::Service::WEATHER);
                id(outdoor_weather_next_request_ms) =
                    status.next_retry_ms != 0 ? status.next_retry_ms : now_ms + 5000UL;
              }
            }
          }
      - script.execute: ui_refresh_time_weather_page
  - interval: 30s
    then:
      - if:
          condition:
            lambda: "return AirDot::onboarding::weather_runtime_allowed(id(setup_ap_active), id(setup_portal_active), id(onboarding_ui_active));"
          then:
            - lambda: |-
                if (!id(outdoor_location_valid))
                  id(weather_refresh_location).execute();
